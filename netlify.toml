[build]
  publish = "reports"
  command = "echo 'Static site — no build step required'"

[build.environment]
  PYTHON_VERSION = "3.12"

[[redirects]]
  from = "/"
  to = "/presentation.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
